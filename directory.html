<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PNWCSA Farmer-to-Farmer Directory</title>
  <link rel="stylesheet" href="library.css">
  <link rel="stylesheet" href="directory.css">
</head>
<body>
  <div class="wrap">
    <div class="page-actions">
      <a class="btn-primary" href="https://docs.google.com/forms/d/1q5GfQhs2kP9P8tWit3c1Fweqxp7IXCXqX6o8mTj2Mx8" target="_blank" rel="noopener">+ Add a person to the directory</a>
    </div>
    <div class="controls">
      <input id="search" class="search" type="search" placeholder="Search people, organizations, locations…" aria-label="Search directory">
      <span id="count" class="count"></span>
    </div>
    <div class="filter-group">
      <span class="filter-label">Category:</span>
      <div id="chips-category" class="chips" role="group" aria-label="Filter by category"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Region:</span>
      <div id="chips-region" class="chips" role="group" aria-label="Filter by region"></div>
    </div>
    <div id="table-container"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="directory.js"></script>
</body>
</html>
