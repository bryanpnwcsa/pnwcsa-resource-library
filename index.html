<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PNWCSA Farmer Resource Library</title>
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <input id="search" class="search" type="search" placeholder="Search resources…" aria-label="Search resources">
      <span id="count" class="count"></span>
    </div>
    <div class="filter-group">
      <span class="filter-label">Category:</span>
      <div id="chips-category" class="chips" role="group" aria-label="Filter by category"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Region:</span>
      <div id="chips-region" class="chips" role="group" aria-label="Filter by region"></div>
    </div>
    <div id="table-container"></div>
  </div>
  <script>window.SHOW_TIPS = false;</script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="library.js"></script>
</body>
</html>
